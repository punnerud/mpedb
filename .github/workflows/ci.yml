# The structural gate for "green means green": the suite and clippy must pass
# with their EXIT CODES checked — this repo has committed with clippy red
# because a local pipeline swallowed the code. Each step here fails the job
# on a non-zero exit by construction.
#
# PostgreSQL-dependent mirror tests, soaks, and benchmarks are #[ignore]d and
# deliberately not run here; the multi-process stress/crash tests DO run
# (they need only a shared-memory scratch dir, which the runners provide).
name: CI

# WHAT RUNS WHEN, and why it is not "everything, every merge":
#
#   push to main / PR  →  Linux only. The fast primary gate. Many merges land
#                         in a day and each full matrix is three runners; the
#                         platform that catches ~all regressions is enough per
#                         commit.
#   nightly 03:00 UTC  →  the full matrix: Linux + macOS + the Windows portable
#                         core. Platform asymmetries (the FLD-2 lock, msync
#                         semantics, range-width costs) are real but they do not
#                         appear and disappear between two merges an hour apart.
#   manual             →  `workflow_dispatch` runs the full matrix on demand,
#                         which is how you check a platform fix without waiting
#                         for the night.
#
# Scheduled runs only fire on the default branch, which is what we want.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Many merges a day: a superseded PR run is wasted runner time, so cancel it.
# A push to main is NOT cancelled — when CI goes red we want to know WHICH
# commit did it, and cancelling intermediate runs destroys exactly that.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Linux and macOS both run the FULL engine. macOS is not redundant: the
  # writer lock is a different construction there (FLD-2 — a sidecar flock plus
  # a process-private errorcheck mutex plus a shared DIRTY word, because macOS
  # has no robust mutex), `sync_barrier` means something different, and `msync`
  # costs range width instead of being a device flush. Three platform
  # asymmetries have already been found by measuring both, so the second row of
  # this matrix earns its runtime.
  test:
    strategy:
      fail-fast: false
      # macOS only on the nightly / manual run — see the schedule note above.
      matrix:
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
                && fromJSON('["ubuntu-latest", "macos-latest"]')
                || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      # Print the toolchain LOUDLY: CI tracks stable, dev boxes lag, and a
      # clippy lint that exists in one and not the other reads as "CI is
      # flaky" when it is really "your box is a release behind". This job has
      # already failed exactly that way (`byte_char_slices`, new in 1.97,
      # against a 1.96 dev box).
      - name: toolchain
        run: rustc --version && cargo --version && cargo clippy --version && sqlite3 --version
      # mold is a build ACCELERATOR, opted into here rather than committed in
      # `.cargo/config.toml`: a committed `-fuse-ld=mold` is a hard dependency,
      # and it broke this workflow — the runners have no mold, so every link
      # died with `collect2: fatal error: cannot find 'ld'` before a test ran.
      # Installed and enabled explicitly, so a runner without it still builds.
      - name: mold (link accelerator, optional)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mold || true
          if command -v mold >/dev/null; then
            echo "RUSTFLAGS=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
            echo "mold enabled: $(mold --version)"
          else
            echo "mold unavailable — building with the default linker"
          fi
      # mpedb-py is excluded on macOS only: its PyO3 cdylib needs
      # `-undefined dynamic_lookup` at link time, which is build-config debt
      # unrelated to the engine (the macOS test-path items in TODO.md). Linux
      # builds it, so the crate stays covered.
      - name: test
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo test --workspace --exclude mpedb-py
          else
            cargo test --workspace
          fi
      - name: clippy
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo clippy --workspace --exclude mpedb-py --all-targets -- -D warnings
          else
            cargo clippy --workspace --all-targets -- -D warnings
          fi
      # mpedb-capi is the libsqlite3-compatible shim: it EXPORTS sqlite3_* and so
      # cannot co-link the bundled sqlite3 that the parent workspace's feature
      # unification pulls in (mpedb/sqlite-checkpoint → rusqlite "bundled" →
      # duplicate symbols, which rust-lld refuses outright). It is therefore its
      # OWN workspace, `exclude`d by the parent, and built by manifest path —
      # where mpedb compiles without the sqlite feature at all.
      - name: capi (its own workspace — the symbol collision is unreachable)
        run: |
          cargo test --manifest-path crates/mpedb-capi/Cargo.toml
          cargo clippy --manifest-path crates/mpedb-capi/Cargo.toml --all-targets -- -D warnings

  # Windows, first time — and deliberately NOT the whole workspace.
  #
  # The ENGINE is Unix-only by construction, not by neglect: MAP_SHARED mmap,
  # flock/fcntl locks, robust PROCESS_SHARED pthread mutexes, `/proc/<pid>/stat`
  # start-time reader identity, msync/fdatasync ordering. 18 files use libc or
  # `std::os::unix`, and there is not one `cfg(windows)` in the tree. A Windows
  # port is a real project, not a CI switch; a job that "tries the workspace"
  # would fail on line one forever and teach nothing.
  #
  # What IS portable is large and load-bearing: `mpedb-types` (values, schema +
  # canonical bytes + blake3 hash, memcmp key encoding, the expression IR with
  # SQL 3VL, plan footprints) and `mpedb-sql` (tokenizer → AST → binder →
  # planner → plan encode/decode/validate). Both have zero Unix dependencies and
  # neither depends on `mpedb-core`.
  #
  # So this job guards exactly one property, and it is worth guarding: the SQL
  # front end and the type system must not silently acquire a platform
  # dependency. It is a real gate on a real subset — it fails the build.
  windows-portable-core:
    # Nightly and on demand only. It is a REAL gate when it runs (a red here
    # fails the run), just not one paid for on every merge — and while the
    # engine has no Windows port, this subset is the only thing that could go
    # green there anyway.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: toolchain
        run: rustc --version; cargo --version
      - name: test the portable crates
        run: cargo test -p mpedb-types -p mpedb-sql
      - name: clippy the portable crates
        run: cargo clippy -p mpedb-types -p mpedb-sql --all-targets -- -D warnings
