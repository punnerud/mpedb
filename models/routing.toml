# The routing workload (stage M4), declared at archetype level until the
# routing schema lands — the model still tells the engine what this database
# is FOR, which is more than most databases ever get told.

[model]
name = "routing"
archetype = "routing"
description = "stops + a travel-time matrix feeding a sequencing solver (the kernel's Held-Karp mode / brooom)"

[[model.table]]
name = "stops"
role = "generic"

  [[model.table.access]]
  kind = "point"
  weight = 0.5

[[model.table]]
name = "matrix"
role = "generic"
read_write = "read-heavy"

  [[model.table.access]]
  kind = "filter-eq"
  columns = ["src"]
  weight = 1.0

  [[model.table.access]]
  kind = "order-by"
  columns = ["secs"]
  weight = 0.5
