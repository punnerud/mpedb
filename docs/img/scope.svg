<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" height="470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <style>
    .t   { fill:#1f2328; }
    .dim { fill:#59636e; }
    .win { fill:#1a7f37; }
    .no  { fill:#cf222e; }
    @media (prefers-color-scheme: dark) {
      .t { fill:#e6edf3; } .dim { fill:#9198a1; }
      .win { fill:#3fb950; } .no { fill:#f85149; }
      .bg { fill:#0d1117; } .card { fill:#161b22; stroke:#30363d; }
      .rule { stroke:#30363d; }
    }
  </style>
  <rect class="bg" width="880" height="470" fill="#ffffff"/>

  <text class="t" x="32" y="46" font-size="25" font-weight="700">What each engine can even be asked to do</text>
  <text class="dim" x="32" y="70" font-size="14">sqlite's own 7.4M-record corpus · CPython's test_sqlite3 · Django's suite · concurrent writer processes</text>

  <!-- column headers -->
  <text class="dim" x="470" y="106" font-size="13" font-weight="600" text-anchor="middle">minisqlite</text>
  <text class="t"   x="640" y="106" font-size="13" font-weight="700" text-anchor="middle">mpedb</text>
  <text class="dim" x="800" y="106" font-size="13" font-weight="600" text-anchor="middle">sqlite3</text>
  <line class="rule" x1="32" y1="118" x2="848" y2="118" stroke="#d1d9e0"/>

  <!-- rows -->
  <g font-size="15">
    <text class="t"   x="32"  y="152">SQL corpus, wrong answers</text>
    <text class="win" x="470" y="152" text-anchor="middle" font-weight="600">0</text>
    <text class="win" x="640" y="152" text-anchor="middle" font-weight="700">0</text>
    <text class="win" x="800" y="152" text-anchor="middle" font-weight="600">0</text>

    <text class="t"   x="32"  y="192">CPython test_sqlite3</text>
    <text class="no"  x="470" y="192" text-anchor="middle" font-weight="600">cannot run</text>
    <text class="win" x="640" y="192" text-anchor="middle" font-weight="700">459 / 467</text>
    <text class="win" x="800" y="192" text-anchor="middle" font-weight="600">467 / 467</text>

    <text class="t"   x="32"  y="232">Django, frozen labels</text>
    <text class="no"  x="470" y="232" text-anchor="middle" font-weight="600">cannot run</text>
    <text class="win" x="640" y="232" text-anchor="middle" font-weight="700">831 / 831</text>
    <text class="win" x="800" y="232" text-anchor="middle" font-weight="600">831 / 831</text>

    <text class="t"   x="32"  y="272">Django, queries label</text>
    <text class="no"  x="470" y="272" text-anchor="middle" font-weight="600">cannot run</text>
    <text class="win" x="640" y="272" text-anchor="middle" font-weight="700">493 / 493</text>
    <text class="win" x="800" y="272" text-anchor="middle" font-weight="600">493 / 493</text>

    <text class="t"   x="32"  y="312">Concurrent writer processes</text>
    <text class="no"  x="470" y="312" text-anchor="middle" font-weight="600">1</text>
    <text class="win" x="640" y="312" text-anchor="middle" font-weight="700">many</text>
    <text class="no"  x="800" y="312" text-anchor="middle" font-weight="600">1</text>

    <text class="t"   x="32"  y="352">Corpus wall clock</text>
    <text class="dim" x="470" y="352" text-anchor="middle">153 s</text>
    <text class="no"  x="640" y="352" text-anchor="middle" font-weight="700">239 s</text>
    <text class="win" x="800" y="352" text-anchor="middle" font-weight="600">68 s</text>
  </g>

  <line class="rule" x1="32" y1="378" x2="848" y2="378" stroke="#d1d9e0"/>
  <text class="no" x="32" y="404" font-size="14" font-weight="600">mpedb is 3.5× SLOWER than sqlite3 on the corpus. That row is not a typo.</text>
  <text class="dim" x="32" y="426" font-size="13">It is ahead on index-backed aggregates (min/max in microseconds, count 55×) and behind on the row pipeline.</text>
  <text class="dim" x="32" y="450" font-size="13">Linux, 621 files, both engines same box, same commit — every number reproducible from §11 of this page.</text>
</svg>
