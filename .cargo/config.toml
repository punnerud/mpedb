# Compile the BUNDLED sqlite (libsqlite3-sys, pinned in Cargo.toml) with the
# math scalar functions (sin/cos/log2/…). The sqlite3 CLI ships them by
# default, and the differential tests (crates/mpedb/tests/sqlite_oracle) use
# the bundled library as their oracle — without this flag the oracle would
# lack functions mpedb implements and cross-checks. Strictly additive for the
# production users of bundled rusqlite (mirror / sqlite-checkpoint).
# mpedb-capi never builds bundled sqlite (it EXPORTS the sqlite3_* symbols),
# so this does not affect the shim.
[env]
LIBSQLITE3_FLAGS = "-DSQLITE_ENABLE_MATH_FUNCTIONS"

# mold as the linker. This repo builds ~140 test binaries, each statically
# linking the whole engine, so LINK time dominates an incremental rebuild.
# MEASURED on the 2-core dev box: `cargo build -p mpedb --tests` after touching
# mpedb-types went 114 s -> 67 s (1.7x). Verified afterwards: the workspace
# suites pass and mpedb-capi's cdylib still links (it exports the sqlite3_*
# symbols, which is the one link that could plausibly differ).
#
# NOT SET HERE, for the same reason `rustc-wrapper` is not (see below): a
# committed `-fuse-ld=mold` is a HARD DEPENDENCY on mold, and it broke CI —
# GitHub's ubuntu runners have no mold, so every link failed with
# `collect2: fatal error: cannot find 'ld'` before a single test ran. A build
# accelerator must never be a hard dependency. Opt in per machine instead:
#
#     export RUSTFLAGS="-C link-arg=-fuse-ld=mold"
#
# or put the `[target.x86_64-unknown-linux-gnu]` block in
# `~/.cargo/config.toml`, which is per-machine and never committed.
# sccache: a compilation cache. MEASURED on this box, and the result is more
# limited than the usual pitch, so here are the numbers rather than the hope:
#
#   same target dir, debug/ wiped:      27 cache hits, rebuild in 4 s
#   a DIFFERENT target dir (the agent
#   worktree case this was added for):  0 hits, 116 misses
#
# So it does NOT share across worktree paths here. It also needs
# CARGO_INCREMENTAL=0 to cache at all (the dev profile's incremental mode is
# non-cacheable), and sccache's own stats name the other exclusions: the
# bundled sqlite C build is "unknown source language", proc-macro/dylib crates
# are "crate-type". Kept because it is free on a miss and genuinely helps a
# rebuild after `cargo clean`; do not expect it to help a fresh worktree.
#
# Set CARGO_INCREMENTAL=0 in the environment when you want hits.
#
# NOT set here: an unconditional `rustc-wrapper` makes EVERY cargo command fail
# on a machine without sccache installed (measured on the M3 — it broke the
# whole run until worked around with RUSTC_WRAPPER=""). A build accelerator
# must never be a hard dependency. Opt in per machine instead:
#     export RUSTC_WRAPPER=sccache
